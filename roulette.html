<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Casino Royal - Roulette de Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-carpet: radial-gradient(circle at 50% 50%, #1c5230 0%, #0c2b17 60%, #05140a 100%);
            --gold-gradient: linear-gradient(135deg, #ffe066 0%, #f1c40f 40%, #b38f00 70%, #665200 100%);
            --wood-border: #331f14;
        }
        body { background: var(--green-carpet); color: white; font-family: 'Playfair Display', Georgia, serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        header { background: rgba(0, 0, 0, 0.6); padding: 15px 20px; border-bottom: 2px solid #b38f00; z-index: 100; }
        header ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; gap: 30px; }
        header ul li a { color: #f1c40f; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-family: sans-serif; font-size: 0.85rem; transition: all 0.3s; }
        header ul li a:hover { color: white; text-shadow: 0 0 10px #f1c40f; }
        main { flex: 1; display: flex; flex-direction: column; position: relative; padding: 20px; align-items: center; justify-content: center; }
        article { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; z-index: 10; }
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 8px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 5px 0; }
        #display { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; height: 60px; color: #f1c40f; background: rgba(0,0,0,0.6); padding: 5px 45px; border-radius: 50px; border: 2px solid #b38f00; display: flex; align-items: center; justify-content: center; }
        .history-container { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; background: rgba(0,0,0,0.7); padding: 8px 25px; border-radius: 50px; border: 1px solid rgba(241, 196, 15, 0.2); }
        .history-label { font-family: sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #d4af37; font-weight: bold; }
        #history-list { display: flex; gap: 10px; }
        .history-item { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: bold; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); }
        .casino-table { position: relative; padding: 30px; background: #140b05; border-radius: 50%; border: 16px solid #0f0703; }
        .roulette-wrapper { position: relative; width: 440px; height: 440px; border: 18px solid var(--wood-border); border-radius: 50%; background: #111; }
        .arrow { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-top: 48px solid #f1c40f; z-index: 100; }
        .center-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 96px; height: 96px; background: var(--gold-gradient); border-radius: 50%; z-index: 25; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transform: rotate(-4.86deg); transition: transform 6s cubic-bezier(0.15, 0, 0.05, 1); background: conic-gradient(#27ae60 0deg 9.73deg, #c0392b 9.73deg 19.46deg, #1a1a1a 19.46deg 29.19deg, #c0392b 29.19deg 38.92deg, #1a1a1a 38.92deg 48.65deg, #c0392b 48.65deg 58.38deg, #1a1a1a 58.38deg 68.11deg, #c0392b 68.11deg 77.84deg, #1a1a1a 77.84deg 87.57deg, #c0392b 87.57deg 97.3deg, #1a1a1a 97.3deg 107.03deg, #c0392b 107.03deg 116.76deg, #1a1a1a 116.76deg 126.49deg, #c0392b 126.49deg 136.22deg, #1a1a1a 136.22deg 145.95deg, #c0392b 145.95deg 155.68deg, #1a1a1a 155.68deg 165.41deg, #c0392b 165.41deg 175.14deg, #1a1a1a 175.14deg 184.87deg, #c0392b 184.87deg 194.6deg, #1a1a1a 194.6deg 204.33deg, #c0392b 204.33deg 214.06deg, #1a1a1a 214.06deg 223.79deg, #c0392b 223.79deg 233.52deg, #1a1a1a 233.52deg 243.25deg, #c0392b 243.25deg 252.98deg, #1a1a1a 252.98deg 262.71deg, #c0392b 262.71deg 272.44deg, #1a1a1a 272.44deg 282.17deg, #c0392b 282.17deg 291.9deg, #1a1a1a 291.9deg 301.63deg, #c0392b 301.63deg 311.36deg, #1a1a1a 311.36deg 321.09deg, #c0392b 321.09deg 330.82deg, #1a1a1a 330.82deg 340.55deg, #c0392b 340.55deg 350.28deg, #1a1a1a 350.28deg 360deg); }
        .number-label { position: absolute; top: 0; left: 50%; width: 30px; height: 50%; margin-left: -15px; transform-origin: bottom center; display: flex; justify-content: center; padding-top: 16px; box-sizing: border-box; font-weight: bold; font-size: 14px; font-family: Arial, sans-serif; color: white; }
        button { margin-top: 35px; padding: 18px 60px; font-size: 1.5rem; cursor: pointer; background: var(--gold-gradient); color: #1a0f0a; border: none; border-radius: 6px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 10px 0 #665200; }
        button:active { transform: translateY(6px); box-shadow: 0 4px 0 #665200; }
        button:disabled { filter: grayscale(0.8); opacity: 0.5; transform: translateY(6px); box-shadow: none; }
        aside { position: absolute; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.7); padding: 10px 15px; border-radius: 5px; font-family: sans-serif; font-size: 0.8rem; color: #bbb; z-index: 10; }
        
        /* --- VISUEL DU LIEN DE BAS DE PAGE --- */
        .bottom-link-container {
            margin-top: 30px;
            margin-bottom: 10px;
            text-align: center;
            z-index: 10;
        }
        .bottom-school-link {
            display: inline-block;
            color: #f1c40f;
            font-weight: bold;
            text-decoration: none;
            padding: 8px 16px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid #b38f00;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
            font-family: sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .bottom-school-link:hover {
            color: white;
            background-color: #b38f00;
            box-shadow: 0 0 15px #f1c40f;
        }

        footer { background: rgba(0, 0, 0, 0.9); text-align: center; padding: 15px; font-family: sans-serif; font-size: 0.9rem; border-top: 2px solid #2b160a; color: #bbb; width: 100%; box-sizing: border-box; }
        footer a { color: #f1c40f; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="roulette.html">Roulette Royale</a></li>
                <li><a href="tweets.html">Tweets</a></li>
                <li><a href="apropos.html">À propos</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <h1>ROULETTE ROYALE</h1>
            <div id="display">Faites vos jeux !</div>
            <div class="history-container">
                <span class="history-label">Historique :</span>
                <div id="history-list"></div>
            </div>
            <div class="casino-table">
                <div class="roulette-wrapper">
                    <div class="arrow"></div>
                    <div class="center-hub"></div>
                    <div id="wheel"></div>
                </div>
            </div>
            <button id="spinBtn" onclick="spin()">SPIN</button>
        </article>
        <aside><p>placeholder to add comment thread later</p></aside>

        <div class="bottom-link-container">
            <a href="https://layrinhac01-creator.github.io/Mon-site-HolbertonSchool/" target="_blank" class="bottom-school-link">
                🔗 Mon profil holberton school
            </a>
        </div>
    </main>
    <footer>
        <p>Réalisé par Loïc Avrinhac pour <a href="https://apply.holbertonschool.com" target="_blank">Holberton School</a></p>
    </footer>
    <script>
        const numbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const wheel = document.getElementById('wheel');
        const display = document.getElementById('display');
        const spinBtn = document.getElementById('spinBtn');
        const historyList = document.getElementById('history-list');
        const degPerSlice = 360 / 37;
        let currentRotation = 0;
        let lastNumbers = [];

        let audioCtx = null;
        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(25, audioCtx.currentTime + 0.04);
                
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            } catch(e) { console.log(e); }
        }

        function initWheel() {
            if (!wheel) return;
            wheel.innerHTML = "";
            numbers.forEach((num, i) => {
                const label = document.createElement('div');
                label.className = 'number-label';
                label.style.transform = `rotate(${(i * degPerSlice) + (degPerSlice / 2)}deg)`;
                label.innerText = num;
                wheel.appendChild(label);
            });
        }

        function updateHistory(number, colorName) {
            let colorHex = "#1a1a1a";
            if (colorName === "ROUGE") colorHex = "#c0392b";
            if (colorName === "VERT") colorHex = "#27ae60";
            lastNumbers.unshift({ num: number, color: colorHex });
            if (lastNumbers.length > 6) lastNumbers.pop();
            historyList.innerHTML = "";
            lastNumbers.forEach(item => {
                const circle = document.createElement('div');
                circle.className = 'history-item';
                circle.style.background = item.color;
                circle.innerText = item.num;
                historyList.appendChild(circle);
            });
        }

        function spin() {
            if (spinBtn) spinBtn.disabled = true;
            if (display) { display.innerText = "La bille tourne..."; display.style.color = "#f1c40f"; }

            let isSpinning = true;
            let clickCount = 0;
            let currentDelay = 35; 
            
            function triggerNextClick() {
                if (isSpinning && clickCount < 75) {
                    playClickSound();
                    clickCount++;
                    currentDelay += (clickCount * 0.18);
                    setTimeout(triggerNextClick, currentDelay);
                }
            }
            triggerNextClick();

            const winningIndex = Math.floor(Math.random() * 37);
            const winningNumber = numbers[winningIndex];
            const extraSpins = 6 * 360; 
            const targetAngle = 360 - (winningIndex * degPerSlice);
            
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360)) - 4.86;
            if (wheel) wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                
                let col = winningNumber === 0 ? "VERT" : ([1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36].includes(winningNumber) ? "ROUGE" : "NOIR");
                if (display) {
                    if (col === "ROUGE") display.style.color = "#ff4d4d";
                    else if (col === "VERT") display.style.color = "#2ecc71";
                    else display.style.color = "#ffffff";
                    display.innerText = `N° ${winningNumber} (${col})`;
                }
                updateHistory(winningNumber, col);
                if (spinBtn) spinBtn.disabled = false;
            }, 6000);
        }
        initWheel();
    </script>
</body>
</html>
