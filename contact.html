<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Casino Royale - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1a472a 0%, #071a10 100%);
            color: white;
            font-family: 'Playfair Display', 'Georgia', serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-bottom: 2px solid #8a6d1c;
            z-index: 100;
        }
        header ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        header ul li a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: sans-serif;
            font-size: 0.9rem;
        }
        header ul li a:hover {
            color: white;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        article {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 12px;
            border: 2px solid #8a6d1c;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: #f1c40f;
            margin-top: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        
        /* Style de la fiche d'informations préremplie */
        .info-card {
            display: flex;
            flex-direction: column;
            gap: 25px;
            font-family: sans-serif;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .info-label {
            color: #f1c40f;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        aside {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            width: fit-content;
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
            padding: 15px;
            font-family: sans-serif;
            font-size: 0.9rem;
            border-top: 1px solid #3e2723;
            color: #ccc;
        }
        footer a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Accueil / Roulette</a></li>
                <li><a href="tweets.html">Tweets</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article>
            <h1>Informations de Contact</h1>
            
            <div class="info-card">
                <div class="info-group">
                    <div class="info-label">Prénom</div>
                    <div class="info-value">Loïc</div>
                </div>
                
                <div class="info-group">
                    <div class="info-label">Nom</div>
                    <div class="info-value">Ayrinhac</div>
                </div>
                
                <div class="info-group">
                    <div class="info-label">Numéro de téléphone</div>
                    <div class="info-value">06 13 85 23 96</div>
                </div>
            </div>
        </article>
    </main>

    <footer>
        <p
